<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Operativo Ceviche</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#faf6f1;--warm:#f3ece3;--card:#fff;--bd:#e8dfd4;--bd2:#d4c9ba;
  --text:#2c1810;--text2:#6b5544;--text3:#9e8e7e;
  --red:#c41e24;--red2:#a01a1f;--redL:#fef2f2;--redT:#dc2626;
  --green:#2d6a4f;--greenL:#ecfdf5;--greenT:#059669;
  --amber:#92600a;--amberL:#fffbeb;--amberT:#d97706;
  --accent:#c41e24;
  --r:14px
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3,.serif{font-family:'Playfair Display',Georgia,serif}

/* HEADER */
.header{background:var(--red);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-left{display:flex;align-items:center;gap:14px}
.header-left img{height:40px}
.header h1{color:#fff;font-size:18px;font-weight:700;letter-spacing:.5px}
.header-right{display:flex;gap:6px;align-items:center}
.h-pill{font-size:9px;font-weight:600;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2)}
.h-btn{background:#fff;color:var(--red);border:none;padding:6px 14px;border-radius:20px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.h-btn:hover{background:#f0e0d8}
.fi{display:none}

/* SUBTITLE BAR */
.sub-bar{background:var(--warm);padding:10px 28px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sub-bar .label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.chip{padding:6px 16px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;border-radius:20px;transition:all .2s;border:1px solid transparent;background:transparent}
.chip:hover{background:var(--card);border-color:var(--bd)}
.chip.on{background:var(--card);color:var(--red);border-color:var(--red);font-weight:700;box-shadow:0 1px 4px rgba(196,30,36,.1)}
.sep{width:1px;height:20px;background:var(--bd);margin:0 6px}
.rest-dd{background:var(--card);border:1px solid var(--bd);color:var(--text);padding:6px 14px;border-radius:20px;font-size:11px;font-family:inherit;outline:none}

/* DATE BAR */
.date-row{padding:14px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--bd);background:var(--card)}
.date-row label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
input[type="date"],input[type="month"]{background:var(--warm);border:1px solid var(--bd);color:var(--text);padding:7px 14px;border-radius:10px;font-size:13px;font-family:inherit;outline:none}
input:focus{border-color:var(--red)}
.d-btn{background:var(--warm);border:1px solid var(--bd);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;transition:.15s}
.d-btn:hover{border-color:var(--red);color:var(--red);background:var(--redL)}
.date-info{margin-left:auto;font-size:10px;color:var(--text3);font-style:italic}

/* KPI CARDS */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:20px 28px}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:20px;text-align:center;position:relative;transition:transform .2s,box-shadow .2s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(44,24,16,.08)}
.kpi-top{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.kpi-num{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
.kpi-num.serif{font-family:'Playfair Display',serif}
.kpi-bot{font-size:10px;color:var(--text3);margin-top:6px}
.c-red{color:var(--redT)}.c-green{color:var(--greenT)}.c-amber{color:var(--amberT)}.c-dark{color:var(--text)}

/* TABLE */
.tbl-section{padding:8px 28px 24px}
.tbl-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tbl-title::before{content:'';width:4px;height:18px;background:var(--red);border-radius:2px}
.tbl-wrap{border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;background:var(--card)}
.tbl-note{margin:8px 2px 0;font-size:11px;color:var(--text3);font-style:italic;line-height:1.5}
.tbl-scroll-hint{display:none;font-size:10px;color:var(--text3);margin-bottom:6px;text-align:right}
@media(max-width:600px){.tbl-scroll-hint{display:block}}
/* evolución chart */
.evo-section{padding:0 28px 28px}
.evo-wrap{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px 12px}
.evo-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.evo-canvas-wrap{position:relative;height:160px}
body.theme-dark .evo-wrap{background:var(--card);border-color:var(--bd)}
@media print{.evo-section{padding:0 20px 8px}.evo-wrap{box-shadow:none;border:1px solid #ddd}.evo-canvas-wrap{height:130px}}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--warm);color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:12px 12px;text-align:center;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:2}
thead th:first-child{text-align:left;padding-left:18px}
tbody td{padding:11px 12px;text-align:center;border-bottom:1px solid var(--bd)}
tbody td:first-child{text-align:left;font-weight:600;padding-left:18px;color:var(--text)}
tbody tr:hover td{background:var(--redL)}
tbody tr{cursor:pointer;transition:background .15s}
.tag{display:inline-block;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:700}
.tag-g{background:var(--greenL);color:var(--greenT)}.tag-a{background:var(--amberL);color:var(--amberT)}.tag-r{background:var(--redL);color:var(--redT)}
.arr{font-weight:700;font-size:10px}.arr-u{color:var(--redT)}.arr-d{color:var(--greenT)}.arr-f{color:var(--text3)}

/* DETAIL */
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(44,24,16,.4);z-index:100;display:none;justify-content:flex-end;backdrop-filter:blur(4px)}.ov.open{display:flex}
.pan{width:min(720px,96vw);height:100vh;background:var(--cream);overflow-y:auto;border-left:1px solid var(--bd);animation:sI .22s ease}
@keyframes sI{from{transform:translateX(100%)}to{transform:translateX(0)}}
.pan-h{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--card);position:sticky;top:0;z-index:10}
.pan-h h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--red)}
.pan-x{background:var(--warm);border:1px solid var(--bd);color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px}
.pan-b{padding:16px 20px}
.pan-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.pan-kpi{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.comp{margin-bottom:14px}.comp table{background:var(--card);border-radius:12px;overflow:hidden}.comp .hl{background:var(--redL)!important}
.chw{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px}
.chw h4{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.ri{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.ri:hover{background:var(--warm)}
.rn{font-size:9px;color:var(--text2)}.rv{font-size:12px;font-weight:700}

.hd{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.kpi{animation:fadeUp .35s ease both}.kpi:nth-child(2){animation-delay:.04s}.kpi:nth-child(3){animation-delay:.08s}.kpi:nth-child(4){animation-delay:.12s}.kpi:nth-child(5){animation-delay:.16s}

/* ── TABLET ── */
@media(max-width:900px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .header{padding:12px 16px}
  .sub-bar{padding:8px 16px}
  .date-row{padding:10px 16px}
  .tbl-section{padding:8px 16px 20px}
  .evo-section{padding:0 16px 20px}
}
/* ── MÓVIL ── */
@media(max-width:600px){
  /* Header */
  .header{padding:10px 14px;gap:6px}
  .header h1{font-size:14px;letter-spacing:0}
  .header-left img{height:28px}
  .header-right{gap:4px;flex-wrap:wrap}
  .h-btn{padding:5px 10px;font-size:8px}
  .h-pill{display:none}

  /* Nav chips */
  .sub-bar{padding:6px 14px;gap:4px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .sub-bar::-webkit-scrollbar{display:none}
  .sub-bar .label{display:none}
  .chip{padding:5px 12px;font-size:10px;white-space:nowrap;flex-shrink:0}
  .sep{display:none}
  .rest-dd{font-size:10px;padding:5px 10px;max-width:160px;flex-shrink:0;white-space:nowrap}

  /* Date row */
  .date-row{padding:10px 14px;gap:6px;flex-wrap:wrap}
  .date-info{display:none}
  input[type="date"],input[type="month"]{font-size:12px;padding:6px 10px}
  #nv3{margin-left:0!important;width:100%;justify-content:flex-start}

  /* KPIs: 2 columnas */
  .kpi-row{grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px}
  .kpi{padding:14px 10px}
  .kpi-num{font-size:22px}
  .kpi-top{font-size:8px}
  .kpi-bot{font-size:9px}

  /* Tabla: scroll horizontal */
  .tbl-section{padding:8px 14px 20px}
  .tbl-title{font-size:14px}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px}
  table{font-size:11px;min-width:560px}
  thead th{padding:10px 8px;font-size:8px}
  tbody td{padding:9px 8px}
  tbody td:first-child{padding-left:12px;min-width:120px;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tag{padding:2px 7px;font-size:9px}

  /* Gráfico */
  .evo-section{padding:0 14px 20px}
  .evo-canvas-wrap{height:130px}

  /* Panel detalle */
  .pan{width:100vw;border-left:none}
  .pan-kpis{grid-template-columns:1fr 1fr}
  .rg{grid-template-columns:1fr}
  .pan-b{padding:12px 14px}
}
/* ── MUY PEQUEÑO (≤380px) ── */
@media(max-width:380px){
  .kpi-row{grid-template-columns:1fr 1fr;gap:6px;padding:10px 10px}
  .kpi-num{font-size:19px}
  .header h1{font-size:12px}
  .chip{padding:4px 9px;font-size:9px}
}

/* PDF export button */
.h-btn-pdf{background:rgba(255,255,255,.15)!important;border:1px solid rgba(255,255,255,.4)!important;margin-left:6px}
.h-btn-pdf:hover{background:rgba(255,255,255,.28)!important}
body.theme-dark .h-btn-pdf{background:rgba(200,80,58,.1)!important;border:1px solid var(--accent)!important;color:var(--accent)!important}
body.theme-dark .h-btn-pdf:hover{background:rgba(200,80,58,.18)!important}
body.theme-cholito .h-btn-pdf{background:rgba(255,255,255,.15)!important;border:1px solid rgba(255,255,255,.5)!important;color:#fff!important}

/* ── PRINT / PDF STYLES ── */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{margin:0;padding:0}
  .sub-bar,.date-row,.fi,.h-btn,.h-pill,.h-btn-pdf{display:none!important}
  .header{padding:12px 20px;break-inside:avoid}
  .header-right{display:none!important}
  .ov{position:static!important;display:block!important}
  .pan{display:none!important}
  .tbl-main{width:100%!important}
  .kpi-row{display:grid!important;grid-template-columns:repeat(5,1fr)!important;padding:12px 20px!important}
  .tbl-section{padding:0 20px 20px!important}
  .tbl-wrap{box-shadow:none!important;border:1px solid #ddd!important}
  tbody tr{break-inside:avoid}
  .print-header{display:flex!important}
  @page{margin:1cm;size:A4 landscape}
}

/* ── TEMA CHOLITO LINDO ── */
body.theme-cholito{
  --cream:#fff0f7;--warm:#fce4f2;--card:#fff;--bd:#f0c4df;--bd2:#e8a8ce;
  --text:#3a0024;--text2:#7a2255;--text3:#b06090;
  --red:#b5006e;--red2:#8c0054;--redL:#fce4f2;--redT:#b5006e;
  --accent:#b5006e;
}
body.theme-cholito .header{background:var(--red)}
body.theme-cholito .chip.on{color:var(--red);border-color:var(--red);box-shadow:0 1px 4px rgba(181,0,110,.15)}
body.theme-cholito .tbl-title::before{background:var(--red)}
body.theme-cholito tbody tr:hover td{background:var(--redL)}
body.theme-cholito input:focus{border-color:var(--red)}
body.theme-cholito .d-btn:hover{border-color:var(--red);color:var(--red);background:var(--redL)}
body.theme-cholito .pan-h h2{color:var(--red)}
body.theme-cholito .h-btn{color:var(--red)}
body.theme-cholito .header .h-btn{color:#fff;background:rgba(255,255,255,.18)}

/* ── VISTA GENERAL ── */
body.theme-dark{
  --cream:#ffffff;--warm:#f7f7f5;--card:#fff;--bd:#e8e4e0;--bd2:#d4cfc9;
  --text:#2a2a2a;--text2:#555550;--text3:#999990;
  --red:#c8503a;--red2:#a83e2c;--redL:#fdf2f0;--redT:#c8503a;
  --accent:#c8503a;
}
body.theme-dark{background:var(--cream);color:var(--text)}
body.theme-dark .header{
  background:#fff;
  border-bottom:1px solid #e0ddd8;
  box-shadow:0 1px 8px rgba(0,0,0,.06);
}
body.theme-dark .header h1{color:var(--text);font-weight:300;letter-spacing:.08em}
body.theme-dark .h-btn{color:var(--accent)}
body.theme-dark .sub-bar{background:#fafaf8;border-bottom:1px solid #ece9e4}
body.theme-dark .date-row{background:#fafaf8;border-bottom:1px solid #ece9e4}
/* chips */
body.theme-dark .chip{color:var(--text3);border-color:#e0ddd8;background:#fff}
body.theme-dark .chip:hover{background:#f5f3f0;border-color:#ccc;color:var(--text2)}
body.theme-dark .chip.on{background:var(--redL);color:var(--accent);border-color:var(--accent);box-shadow:0 1px 6px rgba(200,80,58,.15)}
/* KPIs */
body.theme-dark .kpi{background:#fff;border-color:#e8e4e0}
body.theme-dark .kpi-label{color:var(--text3);font-weight:400;letter-spacing:.04em;text-transform:uppercase;font-size:10px}
body.theme-dark .kpi-num{color:var(--text);font-weight:300}
body.theme-dark .kpi-sub{color:var(--text3)}
/* tabla */
body.theme-dark .tbl-section{background:transparent}
body.theme-dark .tbl-wrap{background:#fff;border-color:#e8e4e0}
body.theme-dark .tbl-title{color:var(--text);font-weight:300;letter-spacing:.06em}
body.theme-dark .tbl-title::before{background:var(--accent)}
body.theme-dark thead th{background:#fafaf8;color:var(--text3);border-bottom:1px solid #e8e4e0;font-weight:500;letter-spacing:.05em;text-transform:uppercase;font-size:10px}
body.theme-dark tbody td{border-bottom:1px solid #f0ede8;color:var(--text2)}
body.theme-dark tbody td:first-child{color:var(--text);font-weight:500}
body.theme-dark tbody tr:hover td{background:var(--redL)}
/* inputs */
body.theme-dark input[type="date"],body.theme-dark input[type="month"]{background:#fff;border-color:#e0ddd8;color:var(--text);color-scheme:light}
body.theme-dark input:focus{border-color:var(--accent)}
body.theme-dark .d-btn{border-color:#e0ddd8;color:var(--text3)}
body.theme-dark .d-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--redL)}
/* panel lateral */
body.theme-dark .pan{background:#fff;border-left:1px solid #e8e4e0}
body.theme-dark .pan-h{background:#fafaf8;border-bottom:1px solid #e8e4e0}
body.theme-dark .pan-h h2{color:var(--accent);font-weight:300;letter-spacing:.06em}
body.theme-dark .pan-kpi{background:#fff;border-color:#e8e4e0}
body.theme-dark .pan-kpi .pk-label{color:var(--text3)}
body.theme-dark .pan-kpi .pk-val{color:var(--text)}
body.theme-dark .chw{background:#fff;border-color:#e8e4e0}
body.theme-dark .chw h3{color:var(--text2);font-weight:400}
body.theme-dark .ri{background:#fff;border-color:#e8e4e0}
body.theme-dark .ri:hover{background:#fafaf8}
body.theme-dark .rn{color:var(--text2)}
body.theme-dark .rv{color:var(--text)}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="https://grupoceviche.com/wp-content/themes/yootheme/cache/d1/logo_rikosBW-d1e1f97b.png" alt="Rikos">
    <h1>Dashboard Operativo Ceviche</h1>
  </div>
  <div class="header-right">
    <span class="h-pill" id="si"></span>
    <label class="h-btn" for="f1">Subir Offline</label><input type="file" id="f1" class="fi" accept=".csv">
    <label class="h-btn" for="f2">Subir Cancellations</label><input type="file" id="f2" class="fi" accept=".csv">
    <label class="h-btn" for="f3">Subir Complaints</label><input type="file" id="f3" class="fi" accept=".csv">
    <button class="h-btn h-btn-pdf" onclick="exportPDF()" title="Exportar PDF">⬇ PDF</button>
  </div>
</div>

<div class="sub-bar">
  <span class="label">Marca</span>
  <div id="nv1"></div>
  <select class="rest-dd" id="restSel" onchange="rV2=this.value;rC()"></select>
  <div class="sep"></div>
  <span class="label">Métrica</span>
  <div id="nv2"></div>

</div>

<div id="ct"></div>

<div class="ov" id="dO" onclick="if(event.target===this)xD()"><div class="pan"><div class="pan-h"><h2 id="dN">—</h2><button class="pan-x" onclick="xD()">✕</button></div><div class="pan-b"><div class="pan-kpis" id="dK"></div><div class="comp" id="dC"></div><div class="chw"><h4 id="dT1"></h4><canvas id="dH1" height="120"></canvas></div><div class="chw"><h4 id="dT2"></h4><canvas id="dH2" height="110"></canvas></div><div class="tbl-title" style="font-size:12px;margin-top:6px" id="dL">Desglose</div><div class="rg" id="dG"></div></div></div></div>

<script>
// Chart.js global defaults for light theme
Chart.defaults.color='#9e8e7e';Chart.defaults.borderColor='#e8dfd4';

const THEMES={
  all:{cls:'theme-dark',chartColor:'#999990',chartBorder:'#e8e4e0'},
  pollos:{cls:'',chartColor:'#9e8e7e',chartBorder:'#e8dfd4'},
  cholito:{cls:'theme-cholito',chartColor:'#c06090',chartBorder:'#f0c4df'},
  gastro:{cls:'theme-dark',chartColor:'#999990',chartBorder:'#e8e4e0'},
};

const BRAND_LOGOS={
  all:'https://grupoceviche.com/wp-content/themes/yootheme/cache/d1/logo_rikosBW-d1e1f97b.png',
  pollos:'https://grupoceviche.com/wp-content/themes/yootheme/cache/d1/logo_rikosBW-d1e1f97b.png',
  cholito:'https://grupoceviche.com/wp-content/themes/yootheme/cache/d1/logo_rikosBW-d1e1f97b.png',
  gastro:'https://grupoceviche.com/wp-content/themes/yootheme/cache/d1/logo_rikosBW-d1e1f97b.png',
};

const BRAND_TITLES={
  all:'Dashboard Operativo Ceviche · Todos',
  pollos:'Dashboard Operativo Ceviche · Pollos Rikos',
  cholito:'Dashboard Operativo Ceviche · Cholito Lindo',
  gastro:'Dashboard Operativo Ceviche · Gastronómicos',
};

let D={off:[],can:[],cmp:[]};
let gV='all',mV='off',sV='daily',rV2='';
const GN={all:'Todos',pollos:'Pollos Rikos',cholito:'Cholito Lindo',gastro:'Gastronómicos'};
const MN={off:'Offline',can:'Cancellations',cmp:'Complaints'};
const MS={off:'s1',can:'s2',cmp:'s3'};
const RC={off:{"Didn't Check In":'#c41e24',Closed:'#1e40af',"Order Failure":'#b45309',"Too Busy Kitchen":'#7e22ce',"Too Many Delayed Orders":'#be123c',"Self-Closure: Outdated Menu":'#4338ca',Unreachable:'#be185d',Other:'#57534e'},

function grp(r){if(r.startsWith('Rikos')||r.includes('Pollos Rikos'))return'pollos';if(r.startsWith('Cholito'))return'cholito';return'gastro';}
const SCHED_FIX={"Barra Brava [BCN]":600,"Carmela":630,"Ceviche 103":610,"Ceviche 103 · Carrer d'Arizala":610,"Ceviche 103 · Londres":630,"Ceviches La Peruana [BCN]":600,"Ceviches La Peruana · Carrer d'Arizala":610,"Chifa Cholo Chang":585,"Cholito Hospitalet":780,"Cholito Lindo · C/ de Sant Pere Més Alt":630,"Cholito Poble Sec":758,"Cholito Sagrada":780,"Cholito Sagrera":810,"La Turuleca":610,"Nikkei 103":330,"Rikos 4 caminos - MAD":630,"Rikos Badal":689,"Rikos Can Vidalet":640,"Rikos Cornella":675,"Rikos Glóries":645,"Rikos Icaria":645,"Rikos Llúria":690,"Rikos Meridiana":645,"Rikos Poble Sec":645,"Rikos Santa Coloma":645};
function schedFix(r,days){return(SCHED_FIX[r]||630)*days;}
function allR(){return[...new Set([...D.off,...D.can,...D.cmp].map(d=>d.r))].sort();}
function gR(){const src=mV;const a=[...new Set(D[src].map(d=>d.r))].sort();let base=gV==='all'?a:a.filter(r=>grp(r)===gV);return rV2?base.filter(r=>r===rV2):base;}
function gD(){const src=mV;return[...new Set(D[src].map(d=>d.d))].sort();}
function cn(n){let s=n.replace(/[\r\n]+/g,' ').replace(/\s+/g,' ').trim();const x=s.match(/^([^(]+)/);if(x){let b=x[1].replace(/ - BCN - /g,' · ').replace(/ - /g,' · ').trim();const l=s.match(/\[([A-Z]+)\]/);if(l&&!b.includes('['))b+=' ['+l[1]+']';return b.length>42?b.slice(0,39)+'...':b;}return s.slice(0,42);}

function bN(){
  const a=allR();const c={all:a.length,pollos:a.filter(r=>grp(r)==='pollos').length,cholito:a.filter(r=>grp(r)==='cholito').length,gastro:a.filter(r=>grp(r)==='gastro').length};

}
function exportPDF(){
  const brand=document.querySelector('.chip.on[data-g]')?.textContent||'Reporte';
  const metric=document.querySelector('.chip.on[data-m]')?.textContent||'';
  const period=document.querySelector('.chip.on[data-p]')?.textContent||'';
  const filename=`Dashboard Ceviche · ${brand} · ${metric} · ${period}.pdf`;

  const btn=document.querySelector('.h-btn-pdf');
  btn.textContent='⏳ Generando...'; btn.disabled=true;

  // Convert all canvas elements to <img> so html2canvas captures them correctly
  const canvases=document.querySelectorAll('canvas');
  const replacements=[];
  canvases.forEach(canvas=>{
    const img=document.createElement('img');
    img.src=canvas.toDataURL('image/png');
    img.style.cssText='width:'+canvas.offsetWidth+'px;height:'+canvas.offsetHeight+'px;display:block';
    canvas.parentNode.insertBefore(img,canvas);
    canvas.style.display='none';
    replacements.push({canvas,img});
  });

  const el=document.querySelector('.main-wrap')||document.body;
  html2pdf().set({
    margin:[8,8,8,8],
    filename:filename,
    image:{type:'jpeg',quality:0.97},
    html2canvas:{scale:2,useCORS:true,logging:false,allowTaint:true},
    jsPDF:{unit:'mm',format:'a4',orientation:'landscape'},
    pagebreak:{mode:['avoid-all']}
  }).from(el).save().then(()=>{
    replacements.forEach(({canvas,img})=>{canvas.style.display='';img.remove();});
    btn.textContent='⬇ PDF'; btn.disabled=false;
  });
}

function pC(t,tp){const a=[];const ls=t.split('\n');let i=0;for(;i<ls.length;i++){if(ls[i].match(/date/i)){i++;break;}}let b='';
for(;i<ls.length;i++){b+=ls[i];if((b.match(/"/g)||[]).length%2){b+=' ';continue;}
const rw=[];let f='',q=false;for(let c2=0;c2<b.length;c2++){if(b[c2]==='"')q=!q;else if(b[c2]===','&&!q){rw.push(f.trim());f='';}else f+=b[c2];}rw.push(f.trim());b='';
if(rw.length>=7&&rw[2]?.match(/^\d{4}-\d{2}-\d{2}/)){
  if(tp==='off')a.push({d:rw[2].trim(),r:cn(rw[0]),reason:rw[3].trim(),off:parseFloat(rw[4])||0,sched:parseFloat(rw[5])||0});
  else if(tp==='can')a.push({d:rw[2].trim(),r:cn(rw[0]),reason:rw[3].trim(),orders:parseFloat(rw[4])||0,loss:parseFloat(rw[6])||0});
  else if(tp==='cmp'&&rw.length>=11)a.push({d:rw[2].trim(),r:cn(rw[0]),reason:rw[8].trim(),complaints:parseFloat(rw[3])||0,orders:parseFloat(rw[4])||0,contacts:parseFloat(rw[9])||0,rate:parseFloat(rw[10]?.replace('%',''))/100||0});
}}return a;}

document.getElementById('f2').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=v=>{D.can=pC(v.target.result,'can');init();};r.readAsText(f);});
document.getElementById('f3').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=v=>{D.cmp=pC(v.target.result,'cmp');init();};r.readAsText(f);});
function init(){const s=k=>[...new Set(D[k].map(d=>d.r))].length;document.getElementById('si').textContent=`${s('off')} rest. · ${gD().length} días`;bN();rC();}

function ds(d,o){const x=new Date(d);x.setDate(x.getDate()+o);return x.toISOString().split('T')[0];}
function mn2(d){const x=new Date(d);const y=x.getDay();x.setDate(x.getDate()-y+(y===0?-6:1));return x.toISOString().split('T')[0];}
function mS(d){return d.substring(0,7)+'-01';}
function dIM(d){const dt=new Date(d);return new Date(dt.getFullYear(),dt.getMonth()+1,0).getDate();}
function pM(d){const dt=new Date(d);dt.setMonth(dt.getMonth()-1);return dt.toISOString().split('T')[0].substring(0,7)+'-01';}

function agg(src,rest,sd2,days){const rs=[];for(let i=0;i<days;i++){const dd=ds(sd2,i);src.filter(x=>x.r===rest&&x.d===dd).forEach(x=>rs.push(x));}if(!rs.length)return null;const re={};
if(mV==='off'){const o=rs.reduce((s,x)=>s+x.off,0);let tS=0;if(days===1){const seen=new Set();rs.forEach(x=>{if(!seen.has(x.d)){tS+=x.sched;seen.add(x.d);}});}else{tS=schedFix(rest,days);}rs.forEach(x=>{re[x.reason]=(re[x.reason]||0)+x.off;});const t=Object.entries(re).sort((a,b)=>b[1]-a[1])[0];return{off:o,sched:tS,rate:tS>0?o/tS:0,reasons:re,top:t?t[0]:'',val:o};}
if(mV==='can'){const o=rs.reduce((s,x)=>s+x.orders,0),l=rs.reduce((s,x)=>s+x.loss,0);rs.forEach(x=>{re[x.reason]=(re[x.reason]||0)+x.orders;});const t=Object.entries(re).sort((a,b)=>b[1]-a[1])[0];return{orders:o,loss:l,reasons:re,top:t?t[0]:'',val:o};}
if(mV==='cmp'){const o=rs.reduce((s,x)=>s+x.complaints,0);const wRate=o>0?rs.reduce((s,x)=>s+x.rate*x.complaints,0)/o:0;rs.forEach(x=>{re[x.reason]=(re[x.reason]||0)+x.complaints;});const t=Object.entries(re).sort((a,b)=>b[1]-a[1])[0];return{complaints:o,contacts:o,rate:wRate,reasons:re,top:t?t[0]:'',val:o};}}
function gP(r,d){return agg(D[mV],r,d,1);}function gW(r,d){return agg(D[mV],r,d,7);}function gMo(r,d){return agg(D[mV],r,mS(d),dIM(d));}

function tg(r){return r>.05?`<span class="tag tag-r">${(r*100).toFixed(2)}%</span>`:r>.02?`<span class="tag tag-a">${(r*100).toFixed(2)}%</span>`:`<span class="tag tag-g">${(r*100).toFixed(2)}%</span>`;}
function ob(o){return o>=3?`<span class="tag tag-r">${o}</span>`:o>=1?`<span class="tag tag-a">${o}</span>`:`<span class="tag tag-g">${o}</span>`;}
function tH(c2,p,inv){if(p==null||c2==null)return'<span class="arr arr-f">—</span>';const d=c2-p;if(Math.abs(d)<(inv?.5:.0005))return'<span class="arr arr-f">—</span>';return`<span class="arr ${d>0?'arr-u':'arr-d'}">${d>0?'▲':'▼'} ${inv?Math.abs(d).toFixed(0):Math.abs(d*100).toFixed(2)+'pp'}</span>`;}
function rc(r){return r>.05?'c-red':r>.02?'c-amber':'c-green';}function esc(s){return s.replace(/'/g,"\\'");}

function gW_m(mv,r,d){return agg(D[mv],r,d,7);}

function rC(){

  let th2;if(isOff)th2='<th>Rate</th><th>Uptime</th><th>Min</th><th>Motivo</th>';else if(isCan)th2='<th>Órdenes</th><th>Pérdida</th><th>Motivo</th>';else th2='<th>Complaints</th><th>Rate</th><th>Motivo</th>';
  const th3=`<th>${pL}</th><th>Δ</th><th>${isM?'2 meses':isW?'4 sem.':'Mes ant.'}</th><th>Δ</th>`;
  h+=`<div class="tbl-section"><div class="tbl-title">${title} — ${rests.length} restaurante${rests.length!==1?'s':''}</div><div class="tbl-scroll-hint">← desliza para ver más →</div><div class="tbl-wrap"><table><thead><tr><th>Restaurante</th>${th2}${th3}</tr></thead><tbody id="${id}B"></tbody></table></div><p class="tbl-note">ℹ️ Si un local no aparece en el listado es porque no tiene incidencias operativas en el período seleccionado.</p></div>`;

function sD(dir){const inp=document.getElementById(dId);if(!inp)return;const isW=sV==='weekly',isM=sV==='monthly',dates=gD();
if(isM){const d=new Date(inp.value+'-01');d.setMonth(d.getMonth()+dir);inp.value=d.toISOString().split('T')[0].substring(0,7);}
else if(isW){const d=new Date(inp.value);d.setDate(d.getDate()+dir*7);inp.value=d.toISOString().split('T')[0];}
else{const i=dates.indexOf(inp.value);if(i>=0)inp.value=dates[Math.max(0,Math.min(dates.length-1,i+dir))]||inp.value;}rV();}

function rV(){

  if(isOff){let gO=0,gS=0,g1O=0,g1S=0,g2O=0,g2S=0;rests.forEach(r=>{const t=gFn(r,d),p=gFn(r,p1),m2=gFn(r,p2);if(t){gO+=t.off;gS+=t.sched;}if(p){g1O+=p.off;g1S+=p.sched;}if(m2){g2O+=m2.off;g2S+=m2.sched;}});

    el(id+'1').textContent=gO;el(id+'1').className='kpi-num serif c-red';el(id+'2').textContent=gL.toFixed(0)+'€';el(id+'2').className='kpi-num serif c-dark';el(id+'4').innerHTML=tH(gO,g1||null,true);el(id+'5').innerHTML=tH(gO,g2||null,true);

    const wR=gCt>0?rests.reduce((s,r)=>{const t=gFn(r,d);return t?s+t.rate*t.complaints:s;},0)/gCt:0;el(id+'1').textContent=gCt;el(id+'1').className='kpi-num serif c-red';el(id+'2').textContent=(wR*100).toFixed(2)+'%';el(id+'2').className=`kpi-num serif ${rc(wR)}`;el(id+'4').innerHTML=tH(gCt,g1||null,true);el(id+'5').innerHTML=tH(gCt,g2||null,true);}
  const res=[];rests.forEach(r=>{const t=gFn(r,d);if(!t)return;const pp=gFn(r,p1),mm=gFn(r,p2);res.push({name:r,t,pp,mm});});
  if(isOff)res.sort((a,b)=>b.t.rate-a.t.rate);else res.sort((a,b)=>b.t.val-a.t.val);

  buildEvoChart(id,rests,d,isOff,isCan,isW,isM);

let evoChart=null;
function buildEvoChart(id,rests,baseDate,isOff,isCan,isW,isM){
  const canvas=document.getElementById(id+'EV');if(!canvas)return;
  const etitle=document.getElementById(id+'ET');
  const per=isM?6:isW?12:30;const step=isW?7:1;
  const accent=getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#c41e24';
  const bdColor=getComputedStyle(document.body).getPropertyValue('--bd').trim()||'#e8dfd4';
  const t3=getComputedStyle(document.body).getPropertyValue('--text3').trim()||'#9e8e7e';
  const labels=[],vals=[],barColors=[];
  for(let i=per-1;i>=0;i--){
    let dd;
    if(isM){dd=baseDate;for(let j=0;j<i;j++)dd=pM(dd);labels.push(dd.substring(0,7));}
    else{dd=ds(baseDate,-i*step);labels.push(dd.substring(5));}
    let total=0,sched=0;
    rests.forEach(r=>{
      const g=isM?gMo(r,dd):isW?gW(r,dd):gP(r,dd);
      if(!g)return;
      if(isOff){total+=g.off;sched+=g.sched;}
      else if(isCan)total+=g.orders;
      else total+=g.complaints;
    });
    const v=isOff&&sched>0?(total/sched*100):total;
    vals.push(v||0);
    if(isOff)barColors.push(v>5?'rgba(196,30,36,.7)':v>2?'rgba(180,83,9,.65)':'rgba(45,106,79,.65)');
